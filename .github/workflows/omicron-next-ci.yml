name: Omicron Next CI

# CI del proyecto Next.js (carpeta omicron-next/). Independiente del CI
# del proyecto Vite en la raíz. Se dispara solo cuando cambian archivos
# dentro de omicron-next/.
on:
  push:
    branches: [main]
    paths:
      - "omicron-next/**"
      - ".github/workflows/omicron-next-ci.yml"
  pull_request:
    paths:
      - "omicron-next/**"
      - ".github/workflows/omicron-next-ci.yml"

defaults:
  run:
    working-directory: omicron-next

jobs:
  quality:
    name: Lint · Typecheck · Test · Build
    runs-on: ubuntu-latest
    # En modo demo (sin estas variables) la app usa datos mock. Se dejan
    # vacías a propósito para que el build no dependa de un backend real.
    env:
      NEXT_PUBLIC_SUPABASE_URL: ""
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Se usa `npm install` porque el package-lock.json se genera en la
      # máquina del usuario (el sandbox de generación no tiene acceso al
      # registro npm). Cuando exista el lockfile, cambiar a `npm ci`.
      - name: Instalar dependencias
        run: npm install

      - name: Lint (ESLint)
        run: npm run lint

      - name: Typecheck (tsc --noEmit)
        run: npm run type-check

      - name: Tests (Vitest)
        run: npm run test

      - name: Build (next build)
        run: npm run build
