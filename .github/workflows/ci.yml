name: CI

# Corre en cada Pull Request hacia main y en cada push directo a main,
# para atrapar errores de tipos, lint y tests ANTES de que lleguen a
# producción (ver BITACORA_MAESTRA.md v7.0 — el bug del trigger SQL que
# rompió el signup vivió meses sin detectarse por falta de este check).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  check:
    name: Typecheck · Lint · Test
    runs-on: ubuntu-latest
    # src/lib/supabase.ts llama createClient() a nivel de módulo (se
    # ejecuta apenas se importa, no dentro de una función). Cualquier
    # archivo que importe supabase.ts -directa o indirectamente-
    # (ej. reputationService.test.ts) revienta con "supabaseUrl is
    # required" si estas variables no existen. Los valores son ficticios
    # a propósito: los tests unitarios (funciones puras) nunca llaman a
    # Supabase de verdad, solo necesitan que createClient() no truene al
    # importarse. NO son secretos reales, no requieren configurar
    # GitHub Secrets.
    env:
      VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
      VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      # NOTA: se usa `npm install` en vez de `npm ci` porque el
      # package-lock.json del repo aún no refleja las devDependencies de
      # Vitest/ESLint agregadas en los PR #8-#10 (se generaron en un
      # sandbox sin acceso a red). Una vez que el usuario suba su
      # package-lock.json actualizado desde su máquina local, cambiar
      # esto de vuelta a `npm ci` (más rápido y determinista).
      - name: Instalar dependencias
        run: npm install

      - name: Typecheck (tsc --noEmit)
        run: npm run typecheck

      - name: Lint (ESLint)
        run: npm run lint

      - name: Tests (Vitest)
        run: npm run test

      - name: Build (vite build)
        run: npm run build
