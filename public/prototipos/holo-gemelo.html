<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Ómicron · Holo-Gemelo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet" />
    <style>
      :root{
        --cyan:#00f0ff; --violet:#a78bfa; --amber:#f5b301; --green:#39ff14; --blue:#5cc8ff; --red:#ff3d57;
        --ink:#eaf2ff; --mut:#93a7c4; --bg:#03040e;
        --mono:"Share Tech Mono",monospace; --disp:"Rajdhani",sans-serif;
      }
      *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
      html,body{height:100%;background:var(--bg);overflow:hidden;font-family:var(--disp);color:var(--ink);}
      #app{position:fixed;inset:0;max-width:480px;margin:0 auto;display:flex;flex-direction:column;
        background:radial-gradient(130% 90% at 50% 32%, #0a1230 0%, #05061a 45%, #02030c 100%);}
      canvas{position:absolute;inset:0;width:100%;height:100%;z-index:0;}

      header{position:relative;z-index:5;display:flex;align-items:center;justify-content:space-between;
        padding:max(14px,env(safe-area-inset-top,0px)) 18px 6px;}
      .brand{display:flex;align-items:center;gap:9px;}
      .omega{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:linear-gradient(135deg,#c9b8ff,#00f0ff);color:#05061a;font-weight:700;font-size:16px;box-shadow:0 0 18px rgba(0,240,255,.55);}
      .brand b{font-size:16px;letter-spacing:.4px;}
      .brand small{font-family:var(--mono);font-size:8px;letter-spacing:2px;color:rgba(167,139,250,.75);display:block;margin-top:-2px;text-transform:uppercase;}
      .lvl{position:relative;z-index:5;align-self:center;margin-top:2px;display:inline-flex;gap:7px;align-items:center;
        padding:5px 13px;border-radius:20px;font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;
        border:1px solid rgba(167,139,250,.35);background:rgba(167,139,250,.1);color:#c9b8ff;}
      .lvl .d{width:6px;height:6px;border-radius:50%;background:#c9b8ff;box-shadow:0 0 8px #c9b8ff;}

      .stage{flex:1;position:relative;z-index:2;min-height:0;}
      /* chips holográficos */
      .chip{position:absolute;left:0;top:0;z-index:4;pointer-events:auto;cursor:pointer;
        padding:8px 13px;border-radius:15px;min-width:82px;
        background:linear-gradient(150deg, rgba(60,80,140,0.28), rgba(20,28,60,0.16));
        border:1px solid rgba(180,200,255,0.22);
        backdrop-filter:blur(9px);-webkit-backdrop-filter:blur(9px);
        box-shadow:0 6px 26px rgba(0,0,0,.4), inset 0 1px 1px rgba(255,255,255,.14);
        transition:box-shadow .2s, border-color .2s; will-change:transform;}
      .chip:active{border-color:rgba(0,240,255,.6);}
      .chip .cl{display:block;font-family:var(--mono);font-size:8.5px;letter-spacing:1.5px;color:var(--mut);text-transform:uppercase;}
      .chip .cv{display:block;font-family:var(--disp);font-weight:700;font-size:21px;line-height:1.05;margin-top:1px;letter-spacing:.3px;}
      .chip.bump{animation:bump .5s ease;}
      @keyframes bump{0%{transform-box:border-box}30%{filter:brightness(1.6)}100%{filter:brightness(1)}}

      /* Oráculo */
      .oracle{position:relative;z-index:5;margin:0 12px calc(12px + env(safe-area-inset-bottom,0px));border-radius:20px;
        border:1px solid rgba(167,139,250,.28);background:linear-gradient(160deg,rgba(16,20,48,.92),rgba(5,7,22,.96));
        backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);box-shadow:0 -8px 32px rgba(0,0,0,.55),0 0 26px rgba(167,139,250,.1);padding:13px;}
      .o-top{display:flex;gap:10px;align-items:flex-start;}
      .o-orb{flex:0 0 auto;width:34px;height:34px;border-radius:50%;display:grid;place-items:center;font-size:15px;
        background:radial-gradient(circle at 40% 35%,#e9e2ff,#a78bfa 60%,#5b3fd6);color:#0a0620;box-shadow:0 0 18px rgba(167,139,250,.6);animation:pl 2.4s ease-in-out infinite;}
      @keyframes pl{0%,100%{transform:scale(1)}50%{transform:scale(1.09)}}
      .o-name{font-family:var(--mono);font-size:8px;letter-spacing:2px;color:#c9b8ff;text-transform:uppercase;}
      .o-say{font-size:14px;line-height:1.48;color:var(--ink);margin-top:2px;min-height:40px;}
      .o-opts{display:flex;flex-wrap:wrap;gap:8px;margin-top:11px;}
      .opt{flex:1 1 40%;min-width:120px;padding:11px 12px;border-radius:12px;cursor:pointer;border:1px solid rgba(255,255,255,.12);
        background:rgba(255,255,255,.04);color:var(--ink);font-family:var(--disp);font-weight:600;font-size:13.5px;
        display:flex;flex-direction:column;gap:2px;text-align:left;transition:all .16s;}
      .opt:hover{border-color:rgba(0,240,255,.5);background:rgba(0,240,255,.06);}
      .opt .oi{font-size:15px;}
      .opt .od{font-family:var(--mono);font-size:8.5px;letter-spacing:.5px;color:var(--mut);text-transform:uppercase;}
      .opt.reco{border-color:var(--amber);background:rgba(245,179,1,.08);box-shadow:0 0 14px rgba(245,179,1,.2);}
      .opt.reco .od{color:var(--amber);}
      .o-foot{display:flex;gap:8px;margin-top:10px;align-items:center;}
      .o-in{flex:1;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.12);border-radius:11px;padding:9px 12px;color:var(--ink);font-family:var(--disp);font-size:13.5px;outline:none;}
      .o-in:focus{border-color:rgba(167,139,250,.5);}
      .o-mic{flex:0 0 auto;width:40px;height:38px;border:none;border-radius:11px;cursor:pointer;display:grid;place-items:center;font-size:16px;
        background:linear-gradient(135deg,#c9b8ff,#a78bfa);color:#0a0620;box-shadow:0 0 14px rgba(167,139,250,.4);}
      .o-mic.on{background:linear-gradient(135deg,#ff8a9c,#ff3d57);animation:pl 1s infinite;}

      .toast{position:fixed;left:50%;top:14%;transform:translateX(-50%) translateY(-10px);z-index:30;padding:9px 16px;border-radius:24px;
        font-family:var(--mono);font-size:12px;letter-spacing:1px;background:rgba(5,7,22,.92);border:1px solid var(--amber);color:var(--amber);
        opacity:0;transition:all .3s;pointer-events:none;text-transform:uppercase;box-shadow:0 0 20px rgba(245,179,1,.3);}
      .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
    </style>
  </head>
  <body>
    <div id="app">
      <canvas id="cv"></canvas>
      <header>
        <div class="brand"><div class="omega">Ω</div><div><b>ÓMICRON</b><small>Gemelo Digital</small></div></div>
      </header>
      <div class="lvl"><span class="d"></span><span id="lvl">Nodo Operativo · N1</span></div>

      <div class="stage" id="stage"></div>

      <div class="oracle">
        <div class="o-top">
          <div class="o-orb">◈</div>
          <div style="flex:1;min-width:0"><div class="o-name">EL ORÁCULO</div><div class="o-say" id="say">Sincronizando tu Gemelo…</div></div>
        </div>
        <div class="o-opts" id="opts"></div>
        <div class="o-foot">
          <input class="o-in" id="in" placeholder="Pregúntame: '¿qué me conviene?'…" autocomplete="off" />
          <button class="o-mic" id="mic" title="Hablar">🎙️</button>
        </div>
      </div>
      <div class="toast" id="toast"></div>
    </div>

    <script>
      (function(){
        "use strict";
        var el=function(id){return document.getElementById(id);};

        // ══ Estado del Gemelo (sinergia real de Ómicron) ══
        var KEY="omicron_holo";
        var BASE={exec:40,qual:30,trans:18,fund:25};
        var st=load();
        function load(){try{var r=localStorage.getItem(KEY);if(r)return JSON.parse(r);}catch(e){}
          return {ejes:Object.assign({},BASE),pe:120,tokens:2480,contracts:0,vault:0,gov:0};}
        function save(){try{localStorage.setItem(KEY,JSON.stringify(st));}catch(e){}}

        function rep(){var e=st.ejes;var avg=(e.exec+e.qual+e.trans+e.fund)/4;return Math.max(0,Math.min(99,Math.round(20+avg*0.72)));}
        function levelName(){var p=st.pe;return p>=5000?"Nodo Pioneer":p>=2000?"Nodo Arquitecto":p>=500?"Nodo Core":"Nodo Operativo";}
        function levelN(){var p=st.pe;return p>=5000?6:p>=2000?4:p>=500?2:1;}
        function nextGoal(){var p=st.pe;if(p<500)return {name:"Nodo Core",need:500-p};if(p<2000)return {name:"Nodo Arquitecto",need:2000-p};if(p<5000)return {name:"Nodo Pioneer",need:5000-p};return null;}

        // ── Métricas → chips (tu referencia, con datos reales) ──
        var CHIPS=[
          {id:"rep",  label:"Reputación", get:function(){return rep();},           color:"#f5b301", a:-1.15, rf:0.62, ph:0},
          {id:"pe",   label:"Experiencia",get:function(){return st.pe;},           color:"#00f0ff", a:-0.35, rf:1.02, ph:1.1, fmt:true},
          {id:"tok",  label:"Tokens Ω",   get:function(){return st.tokens;},       color:"#39ff14", a:0.35,  rf:0.66, ph:2.0, fmt:true},
          {id:"exec", label:"Ejecución",  get:function(){return st.ejes.exec;},    color:"#00f0ff", a:1.15,  rf:1.0,  ph:0.6},
          {id:"qual", label:"Calidad",    get:function(){return st.ejes.qual;},    color:"#39ff14", a:1.9,   rf:0.7,  ph:2.6},
          {id:"trans",label:"Trascend.",  get:function(){return st.ejes.trans;},   color:"#f5b301", a:2.55,  rf:1.02, ph:1.7},
          {id:"fund", label:"Fundamento", get:function(){return st.ejes.fund;},    color:"#a78bfa", a:3.3,   rf:0.72, ph:3.1},
          {id:"nodo", label:"Nodo",       get:function(){return "N"+levelN();},    color:"#a78bfa", a:-2.05, rf:1.0,  ph:0.3, small:true}
        ];

        // Crear DOM de chips
        var stage=el("stage");
        CHIPS.forEach(function(c){
          var d=document.createElement("div");d.className="chip";d.dataset.id=c.id;
          d.innerHTML='<span class="cl">'+c.label+'</span><b class="cv" style="color:'+c.color+'"></b>';
          d.addEventListener("click",function(){explain(c);});
          c.dom=d;c.vEl=d.querySelector(".cv");stage.appendChild(d);
        });
        function fmt(n){return typeof n==="number"?n.toLocaleString("es"):n;}
        function paintChips(){CHIPS.forEach(function(c){var v=c.get();c.vEl.textContent=c.fmt?fmt(v):v;});el("lvl").textContent=levelName()+" · N"+levelN();}

        // ══ Voz ══
        var muted=false,tt=null;
        function say(t){var e=el("say");e.textContent="";clearInterval(tt);var i=0;tt=setInterval(function(){i+=2;e.textContent=t.slice(0,i);if(i>=t.length){e.textContent=t;clearInterval(tt);}},19);
          try{if(!muted&&"speechSynthesis"in window){speechSynthesis.cancel();var u=new SpeechSynthesisUtterance(t);u.lang="es-ES";u.rate=1.04;speechSynthesis.speak(u);}}catch(e2){}}
        function toast(m){var t=el("toast");t.textContent=m;t.classList.add("show");setTimeout(function(){t.classList.remove("show");},1700);}

        // ══ Acciones (el flujo Entrena → Ejecuta → Capitaliza → Gobierna) ══
        var ACTIONS={
          entrena:{ic:"🧠",name:"Entrena",desc:"Academia · +Ejecución",apply:function(){bump("exec",6);bump("fund",8);st.ejes.qual=cap(st.ejes.qual+2);st.pe+=180;},
            msg:"Dominaste una habilidad en la Academia. Tu Ejecución y tu Fundamento suben — así se forja tu Gemelo."},
          ejecuta:{ic:"💼",name:"Ejecuta",desc:"Contrato + Escrow · +Calidad",apply:function(){bump("qual",7);st.ejes.exec=cap(st.ejes.exec+4);st.tokens+=120;st.contracts++;st.pe+=150;},
            msg:"Completaste un contrato con pago protegido por Escrow. Tu Calidad crece y con ella tu reputación."},
          capitaliza:{ic:"🔐",name:"Capitaliza",desc:"Bóveda · +Trascendencia",apply:function(){bump("trans",10);st.tokens+=90;st.vault++;st.pe+=120;},
            msg:"Publicaste una solución en la Bóveda. Ahora genera regalías encadenadas: el conocimiento sigue pagándote."},
          gobierna:{ic:"⚖️",name:"Gobierna",desc:"Tribunal de Pares · +poder",apply:function(){bump("fund",3);st.gov++;st.pe+=60;},
            msg:"Validaste como Tribunal de Pares. Tu criterio sostiene la confianza cero del ecosistema."}
        };
        function cap(v){return Math.min(100,v);}
        var pending=null;
        function bump(eje,d){st.ejes[eje]=cap(st.ejes[eje]+d);var c=chipById(eje);if(c){c.dom.classList.remove("bump");void c.dom.offsetWidth;c.dom.classList.add("bump");}}
        function chipById(id){for(var i=0;i<CHIPS.length;i++)if(CHIPS[i].id===id)return CHIPS[i];return null;}

        function run(key){
          var a=ACTIONS[key];if(!a)return;
          var before=rep(),lvlB=levelName();
          a.apply();save();paintChips();
          shock();
          var after=rep();
          var extra="";
          if(levelName()!==lvlB){bigShock();extra=" ¡Evolucionaste a "+levelName()+"! Nuevas oportunidades se abren.";toast("⬆ "+levelName());}
          else if(after>before){extra=" Reputación "+after+".";}
          say(a.msg+extra);
          setTimeout(guide,1500);
        }

        // El Oráculo recomienda el siguiente mejor paso (lo que necesitas)
        function reco(){
          // simula cada acción y mide ganancia de reputación + PE
          var best=null,bestScore=-1;
          Object.keys(ACTIONS).forEach(function(k){
            var snap=JSON.stringify(st);var r0=rep();var p0=st.pe;
            ACTIONS[k].apply();var score=(rep()-r0)*10+(st.pe-p0)*0.05;
            st=JSON.parse(snap);
            if(score>bestScore){bestScore=score;best=k;}
          });
          return best;
        }
        function guide(){
          var g=nextGoal();var r=reco();
          var opts=[["entrena"],["ejecuta"],["capitaliza"],["gobierna"]];
          renderOpts(r);
          if(g) say("Eres "+levelName()+", reputación "+rep()+". Para llegar a "+g.name+" te faltan "+g.need.toLocaleString("es")+" PE. Lo más rentable ahora es "+ACTIONS[r].name+". Tú eliges.");
          else say("Eres "+levelName()+", el nivel máximo. Sigue capitalizando: tu conocimiento paga en cadena. ¿Qué hacemos?");
        }
        function renderOpts(recoKey){
          var box=el("opts");box.innerHTML="";
          Object.keys(ACTIONS).forEach(function(k){
            var a=ACTIONS[k];var b=document.createElement("button");
            b.className="opt"+(k===recoKey?" reco":"");
            b.innerHTML='<span class="oi">'+a.ic+' '+a.name+(k===recoKey?' ★':'')+'</span><span class="od">'+a.desc+'</span>';
            b.onclick=function(){run(k);};box.appendChild(b);
          });
        }

        function explain(c){
          var m={
            rep:"Tu Reputación ("+rep()+"/100) es tu Gemelo: 80% desempeño real (tus 4 ejes) + 20% credenciales. Imposible de falsear.",
            pe:"Puntos de Experiencia: "+st.pe.toLocaleString("es")+". Marcan tu progreso y tu Nodo. Suben aprendiendo, ejecutando y capitalizando.",
            tok:"Tokens Ω: "+st.tokens.toLocaleString("es")+". Utilidad interna del ecosistema (no son dinero). Desbloquean conocimiento y destacan tu perfil.",
            exec:"Eje Ejecución ("+st.ejes.exec+"): tu capacidad de entregar. Sube al completar contratos y dominar habilidades.",
            qual:"Eje Calidad ("+st.ejes.qual+"): la excelencia de tus entregas, validada entre pares.",
            trans:"Eje Trascendencia ("+st.ejes.trans+"): el valor que dejas a la red. Sube capitalizando en la Bóveda.",
            fund:"Eje Fundamento ("+st.ejes.fund+"): tu base de conocimiento verificable. Sube con la Academia y credenciales.",
            nodo:"Tu Nodo es "+levelName()+". Evolucionas Operativo → Core → Arquitecto → Pioneer ganando PE y reputación."
          };
          say(m[c.id]||c.label);
          c.dom.classList.remove("bump");void c.dom.offsetWidth;c.dom.classList.add("bump");
        }

        // ══ Oráculo conversacional ══
        function handle(q){
          q=(q||"").toLowerCase().trim();if(!q)return;
          if(/convien|recomien|qué hago|que hago|siguiente|necesito|mejor/.test(q)){var r=reco();say("Lo más rentable ahora es "+ACTIONS[r].name+": "+ACTIONS[r].desc.toLowerCase()+". Te lo dejo destacado con una estrella.");renderOpts(r);return;}
          if(/entren|aprend|academ|habilidad/.test(q))return run("entrena");
          if(/ejecut|contrat|trabaj|empleo|escrow/.test(q))return run("ejecuta");
          if(/capitaliz|boveda|bóveda|regal|conocim/.test(q))return run("capitaliza");
          if(/gobern|tribunal|arbitr|vota|justicia/.test(q))return run("gobierna");
          if(/reputaci/.test(q))return explain(chipById("rep"));
          if(/nivel|nodo|tier/.test(q))return explain(chipById("nodo"));
          if(/token/.test(q))return explain(chipById("tok"));
          if(/hola|hey|ayuda/.test(q))return say("Soy tu Oráculo. Te guío por tu Gemelo: dime 'qué me conviene', o toca cualquier dato flotante para entenderlo.");
          say("Te escucho. Prueba: '¿qué me conviene?', 'entrena', 'ejecuta un contrato' o toca un dato del Gemelo.");
        }
        el("in").addEventListener("keydown",function(e){if(e.key==="Enter"){var v=e.target.value;e.target.value="";handle(v);}});
        var SR=window.SpeechRecognition||window.webkitSpeechRecognition,rec=null,lis=false;
        el("mic").onclick=function(){if(!SR){toast("Voz no soportada");say("Tu navegador no soporta voz; usa Chrome o escríbeme.");return;}
          if(lis){try{rec.stop();}catch(e){}return;}rec=new SR();rec.lang="es-ES";rec.interimResults=false;
          rec.onstart=function(){lis=true;el("mic").classList.add("on");say("Te escucho…");};
          rec.onend=function(){lis=false;el("mic").classList.remove("on");};
          rec.onerror=function(){lis=false;el("mic").classList.remove("on");};
          rec.onresult=function(ev){var t=ev.results[0][0].transcript;el("in").value=t;handle(t);};
          try{rec.start();}catch(e){}};

        // ══ CANVAS: orbe + líneas + estrellas ══
        var cv=el("cv"),ctx=cv.getContext("2d");
        var W=0,H=0,DPR=1,cx=0,cy=0,orbR=0,stars=[],shocks=[];
        function layout(){
          DPR=Math.min(window.devicePixelRatio||1,2);var r=cv.getBoundingClientRect();
          W=r.width;H=r.height;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);
          var s=stageRect();cx=s.cx;cy=s.cy;orbR=Math.min(W,H)*0.135;
          stars=[];for(var i=0;i<70;i++)stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.3+0.2,tw:Math.random()*6.28});
        }
        function stageRect(){var s=stage.getBoundingClientRect();var a=document.getElementById("app").getBoundingClientRect();return {cx:s.left-a.left+s.width/2, cy:s.top-a.top+s.height*0.44, w:s.width, h:s.height};}
        function hexA(hex,al){var h=hex.replace("#","");var n=parseInt(h,16);return "rgba("+((n>>16)&255)+","+((n>>8)&255)+","+(n&255)+","+al+")";}
        function shock(){shocks.push({r:orbR,max:orbR*3,w:3,c:"#a78bfa"});}
        function bigShock(){shocks.push({r:orbR,max:orbR*4.5,w:4,c:"#f5b301"});}

        var reduce=window.matchMedia&&window.matchMedia("(prefers-reduced-motion: reduce)").matches;
        var t0=performance.now();
        function frame(now){
          var t=now-t0;ctx.clearRect(0,0,W,H);
          // estrellas
          for(var i=0;i<stars.length;i++){var s=stars[i];var tw=reduce?0.6:0.5+0.5*Math.sin(t*0.001+s.tw);ctx.fillStyle="rgba(200,220,255,"+(0.15+tw*0.4)+")";ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,6.28);ctx.fill();}

          var sc=stageRect();cx=sc.cx;cy=sc.cy;
          var rx=sc.w*0.40, ry=sc.h*0.30;

          // posicionar chips + líneas
          CHIPS.forEach(function(c){
            var fl=reduce?0:Math.sin(t*0.0007+c.ph)*6;
            var x=cx+Math.cos(c.a)*rx*c.rf;
            var y=cy+Math.sin(c.a)*ry*c.rf+fl;
            c.x=x;c.y=y;
            c.dom.style.transform="translate("+x+"px,"+y+"px) translate(-50%,-50%)";
            // línea desde borde del orbe hasta cerca del chip + punto luminoso
            var ang=Math.atan2(y-cy,x-cx);
            var sx=cx+Math.cos(ang)*orbR*0.98, sy=cy+Math.sin(ang)*orbR*0.98;
            var ex=x-Math.cos(ang)*46, ey=y-Math.sin(ang)*30;
            var grad=ctx.createLinearGradient(sx,sy,ex,ey);
            grad.addColorStop(0,hexA(c.color,0.05));grad.addColorStop(1,hexA(c.color,0.5));
            ctx.strokeStyle=grad;ctx.lineWidth=1.2;ctx.beginPath();ctx.moveTo(sx,sy);ctx.lineTo(ex,ey);ctx.stroke();
            // pulso viajando por la línea
            if(!reduce){var pp=(t*0.0004+c.ph*0.2)%1;var px=sx+(ex-sx)*pp,py=sy+(ey-sy)*pp;ctx.fillStyle=hexA(c.color,0.9);ctx.beginPath();ctx.arc(px,py,1.8,0,6.28);ctx.fill();}
            // punto en el chip
            ctx.save();ctx.shadowBlur=10;ctx.shadowColor=c.color;ctx.fillStyle=c.color;ctx.beginPath();ctx.arc(ex,ey,3,0,6.28);ctx.fill();ctx.restore();
          });

          // ── ORBE ──
          var high=rep()>=66;
          var col1=high?"#ffe9b0":"#dff6ff", col2=high?"#f5b301":"#7cc0ff", col3="#a78bfa";
          // halo externo
          var hg=ctx.createRadialGradient(cx,cy,orbR*0.2,cx,cy,orbR*2.1);
          hg.addColorStop(0,hexA(col3,0.22));hg.addColorStop(1,"rgba(0,0,0,0)");
          ctx.fillStyle=hg;ctx.beginPath();ctx.arc(cx,cy,orbR*2.1,0,6.28);ctx.fill();
          // anillos giroscópicos
          var rot=reduce?0:t*0.0004;
          for(var k=0;k<3;k++){
            ctx.save();ctx.translate(cx,cy);ctx.rotate(rot*(k%2?-1:1)+k*0.9);
            ctx.strokeStyle=hexA(k===1?col3:col2,0.35);ctx.lineWidth=1.1;
            ctx.beginPath();ctx.ellipse(0,0,orbR*(1.28+k*0.16),orbR*(0.5+k*0.12),0,0,6.28);ctx.stroke();ctx.restore();
          }
          // esfera
          var pulse=reduce?1:1+Math.sin(t*0.0026)*0.045;var R=orbR*pulse;
          var g=ctx.createRadialGradient(cx-R*0.3,cy-R*0.35,R*0.1,cx,cy,R);
          g.addColorStop(0,col1);g.addColorStop(0.45,col2);g.addColorStop(1,hexA(col3,0.12));
          ctx.save();ctx.shadowBlur=48;ctx.shadowColor=hexA(high?col2:col3,0.7);ctx.fillStyle=g;ctx.beginPath();ctx.arc(cx,cy,R,0,6.28);ctx.fill();ctx.restore();
          // núcleo brillante
          var cg=ctx.createRadialGradient(cx,cy,0,cx,cy,R*0.6);cg.addColorStop(0,"rgba(255,255,255,0.9)");cg.addColorStop(1,"rgba(255,255,255,0)");
          ctx.globalCompositeOperation="screen";ctx.fillStyle=cg;ctx.beginPath();ctx.arc(cx,cy,R*0.6,0,6.28);ctx.fill();ctx.globalCompositeOperation="source-over";
          // anillo de reputación
          ctx.lineWidth=3;ctx.strokeStyle="rgba(255,255,255,0.1)";ctx.beginPath();ctx.arc(cx,cy,R+9,0,6.28);ctx.stroke();
          ctx.strokeStyle=high?col2:"#00f0ff";ctx.beginPath();ctx.arc(cx,cy,R+9,-Math.PI/2,-Math.PI/2+(rep()/100)*6.28);ctx.stroke();
          // número
          ctx.fillStyle="#05061a";ctx.textAlign="center";ctx.textBaseline="middle";ctx.font="700 "+Math.round(R*0.72)+"px Rajdhani, sans-serif";ctx.fillText(rep(),cx,cy-R*0.04);
          ctx.fillStyle="rgba(10,10,30,0.7)";ctx.font="9px 'Share Tech Mono', monospace";ctx.fillText("/ 100",cx,cy+R*0.42);

          // shockwaves
          for(var s2=shocks.length-1;s2>=0;s2--){var sh=shocks[s2];sh.r+=(sh.max-sh.r)*0.06+1.6;var al=Math.max(0,1-sh.r/sh.max);ctx.strokeStyle=hexA(sh.c,al*0.75);ctx.lineWidth=sh.w;ctx.beginPath();ctx.arc(cx,cy,sh.r,0,6.28);ctx.stroke();if(sh.r>=sh.max-2)shocks.splice(s2,1);}
          requestAnimationFrame(frame);
        }
        el("cv").addEventListener("click",function(e){var r=cv.getBoundingClientRect();if(Math.hypot(e.clientX-r.left-cx,e.clientY-r.top-cy)<orbR){say("Yo soy tu Gemelo Digital: reputación "+rep()+", "+levelName()+". Todo tu ser profesional, verificable e imposible de falsear. Cada dato que me rodea eres tú.");}});
        window.addEventListener("resize",layout);

        // ══ Arranque ══
        layout();requestAnimationFrame(frame);paintChips();
        setTimeout(function(){say("Bienvenido. Soy tu Oráculo y esto es tu Gemelo Digital: tu reputación, tus ejes y tu experiencia orbitando en tiempo real. Mi trabajo es decirte qué te conviene y hacerlo crecer contigo. Empecemos.");setTimeout(guide,3200);},450);
        document.body.addEventListener("pointerdown",function once(){try{if("speechSynthesis"in window)speechSynthesis.speak(new SpeechSynthesisUtterance(" "));}catch(e){}document.body.removeEventListener("pointerdown",once);},{once:true});
      })();
    </script>
