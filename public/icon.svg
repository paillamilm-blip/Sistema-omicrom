      <stop offset="0%" stop-color="#0a1428"/>
      <stop offset="100%" stop-color="#020613"/>
    </radialGradient>
    <linearGradient id="omega" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7df9ff"/>
