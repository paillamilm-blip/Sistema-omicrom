<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ómicron Nexus · Experiencia inmersiva</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --cyan: #00f0ff;
        --amber: #f59e0b;
        --green: #39ff14;
        --blue: #38bdf8;
        --red: #ff3d57;
        --mono: "Share Tech Mono", monospace;
        --display: "Rajdhani", sans-serif;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; overflow: hidden; background: #01040d; }
      body { font-family: var(--display); color: #eaf2ff; user-select: none; }
      canvas { position: fixed; inset: 0; display: block; width: 100%; height: 100%; }

      .fx { position: fixed; inset: 0; pointer-events: none; z-index: 2; }
      .fx.grid {
        background-image:
          linear-gradient(rgba(0,240,255,0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0,240,255,0.035) 1px, transparent 1px);
        background-size: 46px 46px;
        -webkit-mask-image: radial-gradient(circle at 50% 50%, #000 28%, transparent 78%);
        mask-image: radial-gradient(circle at 50% 50%, #000 28%, transparent 78%);
      }
      .fx.scan { background: repeating-linear-gradient(0deg, rgba(0,240,255,0.03) 0 1px, transparent 1px 3px); opacity: 0.5; }
      .fx.vig { background: radial-gradient(circle at 50% 45%, transparent 45%, rgba(1,4,13,0.9) 100%); }

      /* ── GATE ── */
      #gate {
        position: fixed; inset: 0; z-index: 20; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 26px; background: #01040d;
        transition: opacity 0.8s; text-align: center; padding: 20px;
      }
      #gate .omega-big {
        width: 96px; height: 96px; border-radius: 24px; display: grid; place-items: center;
        background: linear-gradient(135deg, rgba(125,249,255,0.2), rgba(0,240,255,0.06));
        border: 1px solid rgba(0,240,255,0.45); box-shadow: 0 0 45px rgba(0,240,255,0.4), inset 0 0 30px rgba(0,95,115,0.25);
        font-size: 52px; font-weight: 700; color: #7df9ff; animation: floatY 4s ease-in-out infinite;
        text-shadow: 0 0 20px rgba(0,240,255,0.7);
      }
      @keyframes floatY { 0%,100% { transform: translateY(-6px); } 50% { transform: translateY(6px); } }
      #gate h1 { font-size: 30px; font-weight: 700; letter-spacing: 1px; }
      #gate .tag { font-family: var(--mono); font-size: 11px; letter-spacing: 3px; color: rgba(0,240,255,0.6); text-transform: uppercase; }
      .enter {
        margin-top: 8px; font-family: var(--mono); font-size: 13px; letter-spacing: 3px; text-transform: uppercase;
        padding: 14px 34px; border-radius: 30px; cursor: pointer; color: #020613; font-weight: 700;
        background: linear-gradient(135deg, #7df9ff, #00f0ff); border: none;
        box-shadow: 0 0 30px rgba(0,240,255,0.5); transition: transform 0.2s, box-shadow 0.2s;
      }
      .enter:hover { transform: scale(1.05); box-shadow: 0 0 50px rgba(0,240,255,0.8); }

      /* ── BOOT terminal ── */
      #boot {
        position: fixed; inset: 0; z-index: 15; display: none; flex-direction: column;
        align-items: center; justify-content: center; gap: 20px; padding: 20px;
      }
      #term {
        font-family: var(--mono); font-size: 13px; line-height: 1.9; color: var(--cyan);
        width: min(440px, 90vw); min-height: 170px;
        text-shadow: 0 0 8px rgba(0,240,255,0.5);
      }
      #term .ok { color: var(--green); }
      #term .cursor { animation: blink 0.7s steps(1) infinite; }
      @keyframes blink { 50% { opacity: 0; } }
      #bootbar { width: min(440px, 90vw); height: 3px; background: rgba(0,240,255,0.15); border-radius: 3px; overflow: hidden; }
      #bootbar > i { display: block; height: 100%; width: 0%; background: linear-gradient(90deg, var(--cyan), var(--amber)); box-shadow: 0 0 12px var(--cyan); transition: width 0.2s; }

      /* ── HUD ── */
      .hud { position: fixed; z-index: 10; opacity: 0; transition: opacity 1s; }
      .hud.show { opacity: 1; }
      .top-left { top: 20px; left: 22px; }
      .brand { display: flex; align-items: center; gap: 10px; }
      .omega { width: 32px; height: 32px; border-radius: 9px; display: grid; place-items: center; background: linear-gradient(135deg, #7df9ff, #00f0ff); box-shadow: 0 0 16px rgba(0,240,255,0.6); color: #020613; font-weight: 700; font-size: 17px; }
      .brand .t { font-size: 17px; font-weight: 700; }
      .brand .s { font-family: var(--mono); font-size: 9px; letter-spacing: 2px; color: rgba(0,240,255,0.6); text-transform: uppercase; }

      .top-right { top: 20px; right: 22px; display: flex; align-items: center; gap: 10px; }
      .rep { text-align: right; }
      .rep .n { font-size: 26px; font-weight: 700; color: var(--amber); line-height: 1; }
      .rep .k { font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px; color: rgba(234,242,255,0.5); text-transform: uppercase; }
      .toggle { width: 38px; height: 38px; border-radius: 10px; background: rgba(0,240,255,0.1); border: 1px solid rgba(0,240,255,0.3); color: var(--cyan); display: grid; place-items: center; cursor: pointer; }
      .toggle.off { color: rgba(234,242,255,0.35); border-color: rgba(255,255,255,0.12); }

      /* Tier control */
      .tiers { bottom: 26px; left: 50%; transform: translateX(-50%); display: flex; flex-direction: column; align-items: center; gap: 10px; }
      .tier-row { display: flex; gap: 8px; background: rgba(6,12,26,0.7); border: 1px solid rgba(0,240,255,0.2); border-radius: 30px; padding: 6px; backdrop-filter: blur(10px); }
      .tier-btn { font-family: var(--mono); font-size: 10px; letter-spacing: 1px; text-transform: uppercase; padding: 8px 14px; border-radius: 22px; cursor: pointer; border: none; background: transparent; color: rgba(234,242,255,0.6); transition: all 0.2s; }
      .tier-btn.on { color: #020613; font-weight: 700; }
      .tier-meta { font-family: var(--mono); font-size: 10px; letter-spacing: 1px; color: rgba(234,242,255,0.5); text-transform: uppercase; }

      #tip { position: fixed; z-index: 12; pointer-events: none; opacity: 0; transform: translate(-50%, -140%); transition: opacity 0.15s; background: rgba(6,12,26,0.92); border: 1px solid rgba(0,240,255,0.4); border-radius: 10px; padding: 8px 12px; min-width: 120px; backdrop-filter: blur(10px); }
      #tip .cat { font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; }
      #tip .lbl { font-size: 14px; font-weight: 700; margin-top: 1px; }
      #tip .val { font-family: var(--mono); font-size: 11px; color: rgba(234,242,255,0.7); }

      .flash { position: fixed; left: 50%; top: 42%; transform: translate(-50%,-50%); z-index: 11; font-size: 30px; font-weight: 700; letter-spacing: 2px; opacity: 0; pointer-events: none; text-shadow: 0 0 24px currentColor; }
    </style>
  </head>
  <body>
    <canvas id="c"></canvas>
    <div class="fx grid"></div>
    <div class="fx scan"></div>
    <div class="fx vig"></div>

    <!-- HUD -->
    <div class="hud top-left" id="hud-tl">
      <div class="brand">
        <span class="omega">Ω</span>
        <div><div class="t">Ómicron Nexus</div><div class="s">Gemelo Digital · Confianza Cero</div></div>
      </div>
    </div>
    <div class="hud top-right" id="hud-tr">
      <div class="rep"><div class="n" id="rep">42</div><div class="k">Reputación</div></div>
      <div class="toggle" id="mute" title="Sonido"></div>
    </div>
    <div class="hud tiers" id="hud-tiers">
      <div class="tier-meta" id="tier-meta"></div>
      <div class="tier-row" id="tier-row"></div>
    </div>

    <div id="tip"><div class="cat" id="tip-cat"></div><div class="lbl" id="tip-lbl"></div><div class="val" id="tip-val"></div></div>
    <div class="flash" id="flash"></div>

    <!-- BOOT -->
    <div id="boot">
      <div id="term"></div>
      <div id="bootbar"><i></i></div>
    </div>

    <!-- GATE -->
    <div id="gate">
      <div class="omega-big">Ω</div>
      <div>
        <h1>Sistema Ómicron</h1>
        <div class="tag">Capital Intelectual · Industria 5.0</div>
      </div>
      <button class="enter" id="enter">▶ Iniciar Nexus</button>
      <div class="tag" style="opacity:0.5;font-size:9px">Con sonido · usa audífonos para la experiencia completa</div>
    </div>

    <script>
      // ════════════════ Canvas ════════════════
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");
      let W, H, DPR, CX, CY;
      function resize() {
        DPR = Math.min(window.devicePixelRatio || 1, 2);
        W = innerWidth; H = innerHeight;
        canvas.width = W * DPR; canvas.height = H * DPR;
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
        CX = W / 2; CY = H / 2;
      }
      addEventListener("resize", resize); resize();

      const hexA = (hex, a) => {
        if (hex[0] !== "#") return hex;
        const n = parseInt(hex.slice(1), 16);
        return `rgba(${(n>>16)&255},${(n>>8)&255},${n&255},${Math.max(0,Math.min(1,a))})`;
      };

      // ════════════════ Audio (síntesis pura) ════════════════
      const Snd = {
        ctx: null, master: null, analyser: null, data: null, on: false, drones: [],
        init() {
          try {
            const AC = window.AudioContext || window.webkitAudioContext;
            this.ctx = new AC();
            this.master = this.ctx.createGain();
            this.master.gain.value = 0;
            this.analyser = this.ctx.createAnalyser();
            this.analyser.fftSize = 256;
            this.data = new Uint8Array(this.analyser.frequencyBinCount);
            this.master.connect(this.analyser);
            this.analyser.connect(this.ctx.destination);
            this.startDrone();
            this.on = true;
            this.master.gain.linearRampToValueAtTime(0.5, this.ctx.currentTime + 2.5);
          } catch (e) { this.on = false; }
        },
        startDrone() {
          const now = this.ctx.currentTime;
          [55, 82.41, 110, 164.81].forEach((f, i) => {
            const o = this.ctx.createOscillator();
            o.type = i % 2 ? "sine" : "triangle";
            o.frequency.value = f;
            const g = this.ctx.createGain();
            g.gain.value = 0.12 / (i + 1);
            const lp = this.ctx.createBiquadFilter();
            lp.type = "lowpass"; lp.frequency.value = 700;
            // LFO respiración
            const lfo = this.ctx.createOscillator();
            lfo.frequency.value = 0.06 + i * 0.017;
            const lg = this.ctx.createGain();
            lg.gain.value = 0.06 / (i + 1);
            lfo.connect(lg); lg.connect(g.gain);
            o.connect(g); g.connect(lp); lp.connect(this.master);
            o.start(now); lfo.start(now);
            this.drones.push(o, lfo);
          });
          // shimmer alto
          const s = this.ctx.createOscillator();
          s.type = "sine"; s.frequency.value = 1320;
          const sg = this.ctx.createGain(); sg.gain.value = 0.015;
          const trem = this.ctx.createOscillator(); trem.frequency.value = 0.3;
          const tg = this.ctx.createGain(); tg.gain.value = 0.015;
          trem.connect(tg); tg.connect(sg.gain);
          s.connect(sg); sg.connect(this.master);
          s.start(now); trem.start(now);
          this.drones.push(s, trem);
        },
        note(freq, dur = 0.18, type = "sine", vol = 0.22) {
          if (!this.on) return;
          const now = this.ctx.currentTime;
          const o = this.ctx.createOscillator();
          o.type = type; o.frequency.value = freq;
          const g = this.ctx.createGain();
          g.gain.setValueAtTime(0, now);
          g.gain.linearRampToValueAtTime(vol, now + 0.008);
          g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
          o.connect(g); g.connect(this.master);
          o.start(now); o.stop(now + dur + 0.05);
        },
        blip() { this.note(880 + Math.random() * 120, 0.09, "sine", 0.09); },
        chime() { [523.25, 659.25, 783.99].forEach((f, i) => setTimeout(() => this.note(f, 0.5, "triangle", 0.14), i * 70)); },
        sweep() {
          if (!this.on) return;
          const now = this.ctx.currentTime;
          const o = this.ctx.createOscillator(); o.type = "sawtooth";
          o.frequency.setValueAtTime(180, now);
          o.frequency.exponentialRampToValueAtTime(1400, now + 0.7);
          const g = this.ctx.createGain();
          g.gain.setValueAtTime(0.0001, now);
          g.gain.linearRampToValueAtTime(0.18, now + 0.08);
          g.gain.exponentialRampToValueAtTime(0.0001, now + 0.8);
          const lp = this.ctx.createBiquadFilter(); lp.type = "bandpass"; lp.frequency.value = 900; lp.Q.value = 2;
          o.connect(lp); lp.connect(g); g.connect(this.master);
          o.start(now); o.stop(now + 0.85);
        },
        energy() {
          if (!this.on || !this.analyser) return 0;
          this.analyser.getByteFrequencyData(this.data);
          let s = 0; const n = 24;
          for (let i = 0; i < n; i++) s += this.data[i];
          return s / (n * 255);
        },
        toggle() {
          if (!this.ctx) return this.on;
          if (this.on) { this.master.gain.linearRampToValueAtTime(0, this.ctx.currentTime + 0.4); this.on = false; }
          else { this.on = true; this.master.gain.linearRampToValueAtTime(0.5, this.ctx.currentTime + 0.4); }
          return this.on;
        },
      };

      // ════════════════ Tiers ════════════════
      const CATS = {
        skill: { name: "Habilidad", color: "#00F0FF" },
        cred: { name: "Credencial", color: "#F59E0B" },
        red: { name: "Red / Confianza", color: "#38BDF8" },
        token: { name: "Economía", color: "#39FF14" },
        gob: { name: "Gobernanza", color: "#FF3D57" },
      };
      const TIERS = [
        { name: "Nodo Operativo", pe: "0–499 PE", com: "15%", rep: 42, accent: "#8aa0c0" },
        { name: "Nodo Core", pe: "500–1,999 PE", com: "10%", rep: 70, accent: "#00F0FF" },
        { name: "Nodo Arquitecto", pe: "2,000+ PE", com: "5%", rep: 94, accent: "#F59E0B" },
      ];
      let tier = 0;
      let repShown = 42, repTarget = 42;

      const rand = (a, b) => a + Math.random() * (b - a);
      const RAW = [
        // [minTier, cat, label, val]
        [0, "skill", "Frontend", "Nivel 88"],
        [0, "skill", "Backend", "Nivel 72"],
        [0, "skill", "UX", "Nivel 79"],
        [0, "cred", "Onboarding", "Completado"],
        [0, "red", "12 conexiones", "Red inicial"],
        [0, "token", "180 tokens", "Saldo"],
        [1, "skill", "Arquitectura", "Nivel 64"],
        [1, "skill", "Datos", "Nivel 58"],
        [1, "cred", "React Pro", "Validada"],
        [1, "cred", "System Design", "Validada"],
        [1, "red", "128 conexiones", "Red activa"],
        [1, "red", "Sello de Confianza", "Verificado"],
        [1, "token", "2,480 tokens", "Nodo Core"],
        [2, "cred", "Cloud Security", "Validada"],
        [2, "cred", "Data Engineer", "Validada"],
        [2, "red", "Mentor ×3", "Reputación +"],
        [2, "token", "Escrow 1,100", "En custodia"],
        [2, "gob", "2 votos activos", "Cámara de nodos"],
        [2, "gob", "Árbitro", "Rol asignado"],
      ];
      const nodes = RAW.map(([minTier, cat, label, val], i) => ({
        minTier, cat, label, val, color: CATS[cat].color,
        angle: rand(0, Math.PI * 2), speed: rand(0.05, 0.14) * (Math.random() < 0.5 ? 1 : -1),
        rxF: 0.19 + (i % 3) * 0.072 + rand(-0.02, 0.02),
        ryF: 0.12 + (i % 3) * 0.05 + rand(-0.02, 0.02),
        tilt: rand(-0.6, 0.6), wobble: rand(0.4, 1.1), phase: rand(0, Math.PI * 2),
        baseR: 4.5 + (cat === "token" ? 2.5 : 0) + rand(0, 2),
        born: -1, x: 0, y: 0, depth: 0, alpha: 0, r: 6, pulse: 0,
      }));
      const edges = [[0,3],[1,8],[6,9],[8,12],[10,11],[11,15],[12,16],[17,18],[6,13],[7,14]];
      const dust = Array.from({ length: 80 }, () => ({ x: Math.random(), y: Math.random(), r: rand(0.4,1.7), a: rand(0.05,0.4), vx: rand(-0.02,0.02), vy: rand(-0.02,0.02), tw: rand(0,6.28) }));
      const pulses = nodes.map(() => Math.random());
      const shocks = [];

      // ════════════════ Estado / escena ════════════════
      let scene = "gate"; // gate | boot | nexus
      let bornAt = 0;
      const mouse = { x: CX, y: CY, has: false };
      let hovered = -1;

      addEventListener("pointermove", (e) => { mouse.x = e.clientX; mouse.y = e.clientY; mouse.has = true; });
      addEventListener("pointerdown", () => {
        if (scene === "nexus" && hovered >= 0) { nodes[hovered].pulse = 1; Snd.chime(); }
      });

      // ════════════════ Tier control ════════════════
      const tierRow = document.getElementById("tier-row");
      const tierMeta = document.getElementById("tier-meta");
      TIERS.forEach((tr, i) => {
        const b = document.createElement("button");
        b.className = "tier-btn"; b.textContent = tr.name.replace("Nodo ", "");
        b.onclick = () => setTier(i);
        tierRow.appendChild(b);
      });
      function setTier(i) {
        const up = i > tier;
        tier = i;
        repTarget = TIERS[i].rep;
        // encender nodos recién desbloqueados
        const now = performance.now() / 1000;
        nodes.forEach((n) => { if (n.minTier <= i && n.born < 0) n.born = now; if (n.minTier > i) n.born = -1; });
        // UI
        [...tierRow.children].forEach((c, k) => {
          c.classList.toggle("on", k === i);
          c.style.background = k === i ? TIERS[i].accent : "transparent";
        });
        tierMeta.textContent = `${TIERS[i].name} · ${TIERS[i].pe} · comisión ${TIERS[i].com}`;
        if (up) {
          shocks.push({ t: 0, color: TIERS[i].accent });
          Snd.sweep();
          flash(`${TIERS[i].name.toUpperCase()}`, TIERS[i].accent);
        }
      }
      const flashEl = document.getElementById("flash");
      function flash(text, color) {
        flashEl.textContent = text; flashEl.style.color = color;
        flashEl.animate(
          [{ opacity: 0, transform: "translate(-50%,-50%) scale(0.8)" },
           { opacity: 1, transform: "translate(-50%,-50%) scale(1)" },
           { opacity: 0, transform: "translate(-50%,-50%) scale(1.1)" }],
          { duration: 1600, easing: "ease-out" }
        );
      }

      // Mute
      const muteBtn = document.getElementById("mute");
      const spk = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M15.5 8.5a5 5 0 0 1 0 7"/><path d="M19 5a9 9 0 0 1 0 14"/></svg>';
      const spkOff = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="22" y1="9" x2="16" y2="15"/><line x1="16" y1="9" x2="22" y2="15"/></svg>';
      muteBtn.innerHTML = spk;
      muteBtn.onclick = () => { const on = Snd.toggle(); muteBtn.innerHTML = on ? spk : spkOff; muteBtn.classList.toggle("off", !on); };

      // ════════════════ Boot ════════════════
      const BOOT_LINES = [
        "> conectando a la Red Ómicron...",
        "> autenticando gemelo digital...",
        "> sincronizando capital intelectual...",
        "> mapeando red de confianza...",
        "> núcleo estable. bienvenido, Matías.",
      ];
      function runBoot() {
        scene = "boot";
        document.getElementById("gate").style.opacity = "0";
        setTimeout(() => (document.getElementById("gate").style.display = "none"), 800);
        const bootEl = document.getElementById("boot");
        bootEl.style.display = "flex";
        const term = document.getElementById("term");
        const bar = document.querySelector("#bootbar > i");
        let li = 0, ci = 0, html = "";
        function type() {
          if (li >= BOOT_LINES.length) { setTimeout(enterNexus, 500); return; }
          const line = BOOT_LINES[li];
          if (ci <= line.length) {
            const done = html + line.slice(0, ci) + '<span class="cursor">▋</span>';
            term.innerHTML = done;
            bar.style.width = Math.min(100, ((li + ci / line.length) / BOOT_LINES.length) * 100) + "%";
            ci++;
            setTimeout(type, 18 + Math.random() * 22);
          } else {
            const cls = li === BOOT_LINES.length - 1 ? "ok" : "";
            html += `<span class="${cls}">${line}</span><br>`;
            li++; ci = 0;
            Snd.blip();
            setTimeout(type, 180);
          }
        }
        type();
      }
      function enterNexus() {
        document.getElementById("boot").style.display = "none";
        scene = "nexus";
        bornAt = performance.now() / 1000;
        setTier(1); // arranca en Nodo Core
        ["hud-tl", "hud-tr", "hud-tiers"].forEach((id) => document.getElementById(id).classList.add("show"));
        Snd.chime();
      }

      document.getElementById("enter").onclick = () => { Snd.init(); runBoot(); };

      // ════════════════ Dibujo ════════════════
      const tip = document.getElementById("tip");
      function glowCircle(x, y, r, color, alpha) {
        const g = ctx.createRadialGradient(x, y, 0, x, y, r * 3.4);
        g.addColorStop(0, hexA(color, 0.9 * alpha));
        g.addColorStop(0.4, hexA(color, 0.28 * alpha));
        g.addColorStop(1, hexA(color, 0));
        ctx.fillStyle = g; ctx.beginPath(); ctx.arc(x, y, r * 3.4, 0, 6.2832); ctx.fill();
        ctx.fillStyle = hexA("#ffffff", 0.9 * alpha); ctx.beginPath(); ctx.arc(x, y, r * 0.55, 0, 6.2832); ctx.fill();
        ctx.fillStyle = hexA(color, alpha); ctx.beginPath(); ctx.arc(x, y, r, 0, 6.2832); ctx.fill();
      }
      function drawCore(t, px, py, energy) {
        const R = Math.min(W, H) * 0.082 * (1 + energy * 0.18);
        const halo = ctx.createRadialGradient(px, py, R * 0.6, px, py, R * 2.8);
        halo.addColorStop(0, hexA(TIERS[tier].accent, 0.3 + energy * 0.25));
        halo.addColorStop(1, "rgba(34,211,238,0)");
        ctx.fillStyle = halo; ctx.beginPath(); ctx.arc(px, py, R * 2.8, 0, 6.2832); ctx.fill();
        const core = ctx.createRadialGradient(px - R*0.3, py - R*0.35, R*0.1, px, py, R);
        core.addColorStop(0, "#CFFAFE"); core.addColorStop(0.34, "#22D3EE");
        core.addColorStop(0.68, "#1E40AF"); core.addColorStop(0.95, "#1E1B4B");
        ctx.fillStyle = core; ctx.beginPath(); ctx.arc(px, py, R, 0, 6.2832); ctx.fill();
        ctx.save(); ctx.translate(px, py);
        for (let i = 0; i < 3; i++) {
          ctx.save(); ctx.rotate(t * 0.25 + (i * Math.PI) / 3);
          ctx.strokeStyle = hexA("#E0F7FF", 0.5 - i * 0.12); ctx.lineWidth = 1;
          ctx.beginPath(); ctx.ellipse(0, 0, R * 1.35, R * 0.48, 0, 0, 6.2832); ctx.stroke(); ctx.restore();
        }
        ctx.strokeStyle = "rgba(34,211,238,0.35)"; ctx.setLineDash([1, 4]);
        ctx.beginPath(); ctx.arc(0, 0, R * 1.42, 0, 6.2832); ctx.stroke(); ctx.setLineDash([]); ctx.restore();
        ctx.fillStyle = "rgba(255,255,255,0.4)";
        ctx.beginPath(); ctx.ellipse(px - R*0.28, py - R*0.34, R*0.28, R*0.16, -0.5, 0, 6.2832); ctx.fill();
        ctx.textAlign = "center"; ctx.fillStyle = "#fff";
        ctx.font = `700 ${R*0.6}px Rajdhani, sans-serif`;
        ctx.fillText(String(Math.round(repShown)), px, py + R * 0.12);
        ctx.fillStyle = "rgba(234,247,255,0.85)"; ctx.font = `${R*0.15}px 'Share Tech Mono', monospace`;
        ctx.fillText("REPUTACIÓN", px, py + R * 0.44);
      }

      let hoverPrev = -1;
      function frame(now) {
        const t = now / 1000;
        ctx.clearRect(0, 0, W, H);

        // polvo
        for (const d of dust) {
          d.x += d.vx * 0.0016; d.y += d.vy * 0.0016;
          if (d.x < 0) d.x = 1; if (d.x > 1) d.x = 0; if (d.y < 0) d.y = 1; if (d.y > 1) d.y = 0;
          const tw = 0.5 + 0.5 * Math.sin(t * 1.5 + d.tw);
          ctx.fillStyle = hexA("#9fdcff", d.a * tw);
          ctx.beginPath(); ctx.arc(d.x * W, d.y * H, d.r, 0, 6.2832); ctx.fill();
        }

        const energy = Snd.energy();

        if (scene !== "nexus") { requestAnimationFrame(frame); return; }

        // reputación tween
        repShown += (repTarget - repShown) * 0.05;
        document.getElementById("rep").textContent = String(Math.round(repShown));

        const mx = mouse.has ? mouse.x : CX, my = mouse.has ? mouse.y : CY;
        const par = { x: (mx - CX) * 0.03, y: (my - CY) * 0.03 };
        const coreX = CX + par.x * 0.4, coreY = CY + par.y * 0.4;
        const base = Math.min(W, H);

        for (const n of nodes) {
          const active = n.minTier <= tier && n.born >= 0;
          const ignite = active ? Math.min(1, (t - n.born) / 0.7) : Math.max(0, (n.ig || 0) - 0.05);
          n.ig = ignite;
          n.angle += n.speed * 0.0026 * 16;
          const rx = base * n.rxF, ry = base * n.ryF;
          const ca = Math.cos(n.angle), sa = Math.sin(n.angle);
          let ox = ca * rx, oy = sa * ry;
          const x = ox * Math.cos(n.tilt) - oy * Math.sin(n.tilt);
          const y = ox * Math.sin(n.tilt) + oy * Math.cos(n.tilt);
          const wob = Math.sin(t * n.wobble + n.phase) * 8;
          n.depth = sa;
          const sc = (0.72 + (n.depth + 1) / 2 * 0.6) * (0.4 + 0.6 * ignite);
          n.alpha = (0.45 + (n.depth + 1) / 2 * 0.55) * ignite;
          n.x = coreX + x * ignite + par.x + wob * 0.3;
          n.y = coreY + y * ignite + par.y;
          n.r = n.baseR * sc;
          if (n.pulse > 0) n.pulse = Math.max(0, n.pulse - 0.012);
        }

        // hover
        hovered = -1; let hd = 24;
        nodes.forEach((n, i) => {
          if (n.ig < 0.5) return;
          const d = Math.hypot(mx - n.x, my - n.y);
          if (d < hd + n.r) { hd = d; hovered = i; }
        });
        if (hovered !== hoverPrev && hovered >= 0) Snd.blip();
        hoverPrev = hovered;

        const order = nodes.map((_, i) => i).sort((a, b) => nodes[a].depth - nodes[b].depth);
        drawNodes(order.filter((i) => nodes[i].depth < 0), t, coreX, coreY);

        ctx.lineWidth = 1;
        for (const [a, b] of edges) {
          const na = nodes[a], nb = nodes[b];
          if (na.ig < 0.5 || nb.ig < 0.5) continue;
          ctx.strokeStyle = hexA("#7fdfff", 0.08 + 0.1 * Math.min(na.alpha, nb.alpha));
          ctx.beginPath(); ctx.moveTo(na.x, na.y); ctx.lineTo(nb.x, nb.y); ctx.stroke();
        }

        drawCore(t, coreX, coreY, energy);
        drawNodes(order.filter((i) => nodes[i].depth >= 0), t, coreX, coreY);

        // shockwaves de evolución
        for (let i = shocks.length - 1; i >= 0; i--) {
          const s = shocks[i]; s.t += 0.02;
          const rr = s.t * Math.min(W, H) * 0.7;
          ctx.strokeStyle = hexA(s.color, Math.max(0, 0.6 * (1 - s.t)));
          ctx.lineWidth = 2 + (1 - s.t) * 3;
          ctx.beginPath(); ctx.arc(coreX, coreY, rr, 0, 6.2832); ctx.stroke();
          if (s.t >= 1) shocks.splice(i, 1);
        }

        // tooltip
        if (hovered >= 0) {
          const n = nodes[hovered];
          tip.style.left = n.x + "px"; tip.style.top = n.y - n.r + "px"; tip.style.opacity = "1";
          tip.style.borderColor = hexA(n.color, 0.6);
          document.getElementById("tip-cat").textContent = CATS[n.cat].name;
          document.getElementById("tip-cat").style.color = n.color;
          document.getElementById("tip-lbl").textContent = n.label;
          document.getElementById("tip-val").textContent = n.val;
          canvas.style.cursor = "pointer";
        } else { tip.style.opacity = "0"; canvas.style.cursor = "default"; }

        requestAnimationFrame(frame);
      }

      function drawNodes(idxs, t, coreX, coreY) {
        for (const i of idxs) {
          const n = nodes[i];
          if (n.ig < 0.02) continue;
          const isHover = i === hovered;
          const la = (0.14 + (n.depth + 1) / 2 * 0.14) * n.ig * (isHover ? 2.2 : 1);
          const grad = ctx.createLinearGradient(coreX, coreY, n.x, n.y);
          grad.addColorStop(0, hexA(n.color, 0)); grad.addColorStop(1, hexA(n.color, la));
          ctx.strokeStyle = grad; ctx.lineWidth = isHover ? 1.6 : 1;
          ctx.beginPath(); ctx.moveTo(coreX, coreY); ctx.lineTo(n.x, n.y); ctx.stroke();

          let p = (pulses[i] + t * 0.28) % 1;
          ctx.fillStyle = hexA(n.color, (1 - p) * n.alpha * 0.9);
          ctx.beginPath(); ctx.arc(coreX + (n.x - coreX) * p, coreY + (n.y - coreY) * p, 1.8, 0, 6.2832); ctx.fill();

          const rr = n.r * (isHover ? 1.6 : 1) + (n.pulse > 0 ? n.pulse * 6 : 0);
          glowCircle(n.x, n.y, rr, n.color, n.alpha);
          if (n.pulse > 0) {
            ctx.strokeStyle = hexA(n.color, n.pulse * 0.8); ctx.lineWidth = 1.5;
            ctx.beginPath(); ctx.arc(n.x, n.y, rr + (1 - n.pulse) * 22, 0, 6.2832); ctx.stroke();
          }
          if (isHover || (n.depth > 0.4 && n.ig > 0.8)) {
            ctx.textAlign = "center";
            ctx.fillStyle = hexA("#eaf2ff", isHover ? 0.95 : 0.5 * n.alpha);
            ctx.font = `${isHover ? 12 : 10}px 'Share Tech Mono', monospace`;
            ctx.fillText(n.label, n.x, n.y - rr - 8);
          }
        }
      }

      requestAnimationFrame(frame);
    </script>
  </body>
</html>
