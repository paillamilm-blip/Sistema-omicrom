<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ómicron · Gemelo Digital Vivo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=Share+Tech+Mono&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --cyan: #00f0ff;
        --amber: #f59e0b;
        --green: #39ff14;
        --blue: #38bdf8;
        --red: #ff3d57;
        --mono: "Share Tech Mono", monospace;
        --display: "Rajdhani", sans-serif;
      }
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { height: 100%; overflow: hidden; background: #01040d; }
      body { font-family: var(--display); color: #eaf2ff; }
      #stage { position: fixed; inset: 0; }
      canvas { display: block; width: 100%; height: 100%; }

      /* Grid + vignette overlay */
      .fx {
        position: fixed; inset: 0; pointer-events: none; z-index: 2;
      }
      .fx.grid {
        background-image:
          linear-gradient(rgba(0,240,255,0.035) 1px, transparent 1px),
          linear-gradient(90deg, rgba(0,240,255,0.035) 1px, transparent 1px);
        background-size: 46px 46px;
        mask-image: radial-gradient(circle at 50% 50%, #000 30%, transparent 78%);
        -webkit-mask-image: radial-gradient(circle at 50% 50%, #000 30%, transparent 78%);
      }
      .fx.vig {
        background: radial-gradient(circle at 50% 45%, transparent 45%, rgba(1,4,13,0.85) 100%);
      }
      .fx.scan {
        background: repeating-linear-gradient(0deg, rgba(0,240,255,0.03) 0 1px, transparent 1px 3px);
        opacity: 0.5;
      }

      /* HUD */
      .hud { position: fixed; z-index: 5; }
      .top-left { top: 22px; left: 24px; }
      .brand { display: flex; align-items: center; gap: 10px; }
      .omega {
        width: 34px; height: 34px; border-radius: 9px; display: grid; place-items: center;
        background: linear-gradient(135deg, #7df9ff, #00f0ff);
        box-shadow: 0 0 18px rgba(0,240,255,0.6); color: #020613; font-weight: 700; font-size: 18px;
      }
      .brand .t { font-size: 18px; font-weight: 700; letter-spacing: 0.3px; }
      .brand .s {
        font-family: var(--mono); font-size: 10px; letter-spacing: 2px;
        color: rgba(0,240,255,0.6); text-transform: uppercase;
      }
      .hint {
        position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
        font-family: var(--mono); font-size: 11px; letter-spacing: 1.5px;
        color: rgba(234,242,255,0.4); text-transform: uppercase; z-index: 5; text-align: center;
        animation: fade 3s ease-in-out infinite;
      }
      @keyframes fade { 0%,100% { opacity: 0.35; } 50% { opacity: 0.7; } }

      /* Legend / filtros */
      .legend {
        position: fixed; top: 22px; right: 24px; z-index: 5;
        display: flex; flex-direction: column; gap: 7px; align-items: flex-end;
      }
      .chip {
        display: inline-flex; align-items: center; gap: 7px;
        font-family: var(--mono); font-size: 10px; letter-spacing: 1px; text-transform: uppercase;
        padding: 5px 11px; border-radius: 20px; cursor: pointer; user-select: none;
        border: 1px solid rgba(255,255,255,0.12); background: rgba(10,20,40,0.6);
        color: rgba(234,242,255,0.75); transition: all 0.2s; backdrop-filter: blur(6px);
      }
      .chip .swatch { width: 8px; height: 8px; border-radius: 50%; }
      .chip.off { opacity: 0.35; }

      /* Tooltip */
      #tip {
        position: fixed; z-index: 6; pointer-events: none; opacity: 0;
        transform: translate(-50%, -140%); transition: opacity 0.15s;
        background: rgba(6,12,26,0.92); border: 1px solid rgba(0,240,255,0.4);
        border-radius: 10px; padding: 9px 12px; min-width: 130px; backdrop-filter: blur(10px);
        box-shadow: 0 8px 30px rgba(0,0,0,0.6), 0 0 20px rgba(0,240,255,0.15);
      }
      #tip .cat { font-family: var(--mono); font-size: 9px; letter-spacing: 1.5px; text-transform: uppercase; }
      #tip .lbl { font-size: 15px; font-weight: 700; margin-top: 2px; }
      #tip .val { font-family: var(--mono); font-size: 12px; color: rgba(234,242,255,0.7); margin-top: 1px; }

      .credit {
        position: fixed; bottom: 18px; right: 20px; z-index: 5;
        font-family: var(--mono); font-size: 9px; letter-spacing: 1px;
        color: rgba(234,242,255,0.25); text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <div id="stage"><canvas id="c"></canvas></div>
    <div class="fx grid"></div>
    <div class="fx scan"></div>
    <div class="fx vig"></div>

    <div class="hud top-left">
      <div class="brand">
        <span class="omega">Ω</span>
        <div>
          <div class="t">Gemelo Digital</div>
          <div class="s">Constelación viva · Confianza Cero</div>
        </div>
      </div>
    </div>

    <div class="legend" id="legend"></div>

    <div id="tip">
      <div class="cat" id="tip-cat"></div>
      <div class="lbl" id="tip-lbl"></div>
      <div class="val" id="tip-val"></div>
    </div>

    <div class="hint">Mueve el cursor · pasa sobre un nodo · toca las categorías</div>
    <div class="credit">Sistema Ómicron · Industria 5.0</div>

    <script>
      const canvas = document.getElementById("c");
      const ctx = canvas.getContext("2d");
      let W = 0, H = 0, DPR = 1, CX = 0, CY = 0;

      function resize() {
        DPR = Math.min(window.devicePixelRatio || 1, 2);
        W = window.innerWidth;
        H = window.innerHeight;
        canvas.width = W * DPR;
        canvas.height = H * DPR;
        ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
        CX = W / 2;
        CY = H / 2;
      }
      window.addEventListener("resize", resize);
      resize();

      // ── Categorías ──
      const CATS = {
        skill: { name: "Habilidad", color: "#00F0FF" },
        cred: { name: "Credencial", color: "#F59E0B" },
        red: { name: "Red / Confianza", color: "#38BDF8" },
        token: { name: "Economía", color: "#39FF14" },
        gob: { name: "Gobernanza", color: "#FF3D57" },
      };
      const enabled = {};
      Object.keys(CATS).forEach((k) => (enabled[k] = true));

      // ── Datos que orbitan tu orbe ──
      const RAW = [
        ["skill", "Frontend", "Nivel 88"],
        ["skill", "Backend", "Nivel 72"],
        ["skill", "Arquitectura", "Nivel 64"],
        ["skill", "Datos", "Nivel 58"],
        ["skill", "UX", "Nivel 79"],
        ["cred", "React Pro", "Validada"],
        ["cred", "System Design", "Validada"],
        ["cred", "Cloud Security", "Validada"],
        ["cred", "Data Engineer", "En revisión"],
        ["red", "128 conexiones", "Red activa"],
        ["red", "Sello de Confianza", "Verificado"],
        ["red", "Mentor ×3", "Reputación +"],
        ["token", "2,480 tokens", "Nodo Core · 10%"],
        ["token", "Escrow 1,100", "En custodia"],
        ["gob", "2 votos activos", "Cámara de nodos"],
        ["gob", "Árbitro", "Rol asignado"],
      ];

      const rand = (a, b) => a + Math.random() * (b - a);
      const nodes = RAW.map(([cat, label, val], i) => {
        const ring = i % 3; // 3 capas de profundidad
        const base = Math.min(W, H);
        return {
          cat, label, val, ring,
          color: CATS[cat].color,
          angle: rand(0, Math.PI * 2),
          speed: rand(0.05, 0.14) * (Math.random() < 0.5 ? 1 : -1),
          rxF: 0.20 + ring * 0.075 + rand(-0.015, 0.015),
          ryF: 0.13 + ring * 0.05 + rand(-0.015, 0.015),
          tilt: rand(-0.5, 0.5),
          wobble: rand(0.4, 1.1),
          phase: rand(0, Math.PI * 2),
          baseR: 4.5 + (cat === "token" ? 3 : 0) + rand(0, 2),
          x: 0, y: 0, depth: 0, scale: 1, alpha: 1, r: 6,
          pulse: 0,
        };
      });

      // Aristas de la constelación (conexiones entre nodos afines)
      const edges = [
        [0, 5], [1, 6], [2, 6], [5, 12], [9, 10], [10, 11], [12, 13], [14, 15], [2, 7], [3, 8],
      ];

      // Partículas de polvo estelar
      const dust = Array.from({ length: 70 }, () => ({
        x: Math.random(), y: Math.random(),
        r: rand(0.4, 1.6), a: rand(0.05, 0.4),
        vx: rand(-0.02, 0.02), vy: rand(-0.02, 0.02),
        tw: rand(0, Math.PI * 2),
      }));

      // Pulsos de energía centro→nodo
      const pulses = nodes.map(() => rand(0, 1));

      // ── Interacción ──
      const mouse = { x: CX, y: CY, has: false };
      let hovered = -1;
      window.addEventListener("pointermove", (e) => {
        mouse.x = e.clientX; mouse.y = e.clientY; mouse.has = true;
      });
      window.addEventListener("pointerleave", () => (mouse.has = false));
      window.addEventListener("pointerdown", () => {
        if (hovered >= 0) nodes[hovered].pulse = 1;
      });

      // Leyenda / filtros
      const legend = document.getElementById("legend");
      Object.entries(CATS).forEach(([k, v]) => {
        const c = document.createElement("div");
        c.className = "chip";
        c.innerHTML = `<span class="swatch" style="background:${v.color};box-shadow:0 0 8px ${v.color}"></span>${v.name}`;
        c.onclick = () => {
          enabled[k] = !enabled[k];
          c.classList.toggle("off", !enabled[k]);
        };
        legend.appendChild(c);
      });

      const tip = document.getElementById("tip");
      const tipCat = document.getElementById("tip-cat");
      const tipLbl = document.getElementById("tip-lbl");
      const tipVal = document.getElementById("tip-val");

      // ── Helpers de dibujo ──
      function glowCircle(x, y, r, color, alpha) {
        const g = ctx.createRadialGradient(x, y, 0, x, y, r * 3.4);
        g.addColorStop(0, hexA(color, 0.9 * alpha));
        g.addColorStop(0.4, hexA(color, 0.28 * alpha));
        g.addColorStop(1, hexA(color, 0));
        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(x, y, r * 3.4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = hexA("#ffffff", 0.9 * alpha);
        ctx.beginPath();
        ctx.arc(x, y, r * 0.55, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = hexA(color, alpha);
        ctx.beginPath();
        ctx.arc(x, y, r, 0, Math.PI * 2);
        ctx.fill();
      }
      function hexA(hex, a) {
        if (hex[0] !== "#") return hex;
        const n = parseInt(hex.slice(1), 16);
        const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
        return `rgba(${r},${g},${b},${Math.max(0, Math.min(1, a))})`;
      }

      // ── Orbe central (Tú) ──
      function drawCore(t, px, py) {
        const R = Math.min(W, H) * 0.085;
        // halo
        const halo = ctx.createRadialGradient(px, py, R * 0.6, px, py, R * 2.6);
        halo.addColorStop(0, "rgba(34,211,238,0.28)");
        halo.addColorStop(1, "rgba(34,211,238,0)");
        ctx.fillStyle = halo;
        ctx.beginPath(); ctx.arc(px, py, R * 2.6, 0, Math.PI * 2); ctx.fill();

        // cuerpo del orbe con profundidad
        const core = ctx.createRadialGradient(
          px - R * 0.3, py - R * 0.35, R * 0.1, px, py, R
        );
        core.addColorStop(0, "#CFFAFE");
        core.addColorStop(0.34, "#22D3EE");
        core.addColorStop(0.68, "#1E40AF");
        core.addColorStop(0.95, "#1E1B4B");
        ctx.fillStyle = core;
        ctx.beginPath(); ctx.arc(px, py, R, 0, Math.PI * 2); ctx.fill();

        // anillos HUD giratorios
        ctx.save();
        ctx.translate(px, py);
        for (let i = 0; i < 3; i++) {
          ctx.save();
          ctx.rotate(t * 0.25 + (i * Math.PI) / 3);
          ctx.strokeStyle = hexA("#E0F7FF", 0.5 - i * 0.12);
          ctx.lineWidth = 1;
          ctx.beginPath();
          ctx.ellipse(0, 0, R * 1.35, R * 0.48, 0, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }
        // borde punteado
        ctx.strokeStyle = "rgba(34,211,238,0.35)";
        ctx.setLineDash([1, 4]);
        ctx.beginPath(); ctx.arc(0, 0, R * 1.42, 0, Math.PI * 2); ctx.stroke();
        ctx.setLineDash([]);
        ctx.restore();

        // brillo especular
        ctx.fillStyle = "rgba(255,255,255,0.4)";
        ctx.beginPath();
        ctx.ellipse(px - R * 0.28, py - R * 0.34, R * 0.28, R * 0.16, -0.5, 0, Math.PI * 2);
        ctx.fill();

        // reputación en el centro
        ctx.textAlign = "center";
        ctx.fillStyle = "#ffffff";
        ctx.font = `700 ${R * 0.62}px Rajdhani, sans-serif`;
        ctx.fillText("94", px, py + R * 0.12);
        ctx.fillStyle = "rgba(234,247,255,0.85)";
        ctx.font = `${R * 0.16}px 'Share Tech Mono', monospace`;
        ctx.fillText("REPUTACIÓN", px, py + R * 0.46);
      }

      // ── Loop ──
      let last = performance.now();
      function frame(now) {
        const t = now / 1000;
        last = now;
        ctx.clearRect(0, 0, W, H);

        // parallax suave siguiendo el cursor
        const mx = mouse.has ? mouse.x : CX;
        const my = mouse.has ? mouse.y : CY;
        const par = { x: (mx - CX) * 0.03, y: (my - CY) * 0.03 };
        const coreX = CX + par.x * 0.4;
        const coreY = CY + par.y * 0.4;

        // polvo estelar
        for (const d of dust) {
          d.x += d.vx * 0.0016; d.y += d.vy * 0.0016;
          if (d.x < 0) d.x = 1; if (d.x > 1) d.x = 0;
          if (d.y < 0) d.y = 1; if (d.y > 1) d.y = 0;
          const tw = 0.5 + 0.5 * Math.sin(t * 1.5 + d.tw);
          ctx.fillStyle = hexA("#9fdcff", d.a * tw);
          ctx.beginPath();
          ctx.arc(d.x * W, d.y * H, d.r, 0, Math.PI * 2);
          ctx.fill();
        }

        // calcular posiciones de nodos
        const base = Math.min(W, H);
        for (const n of nodes) {
          n.angle += n.speed * 0.0026 * (last ? 16 : 16);
          const rx = base * n.rxF;
          const ry = base * n.ryF;
          const ca = Math.cos(n.angle), sa = Math.sin(n.angle);
          // órbita inclinada
          let ox = ca * rx;
          let oy = sa * ry;
          const rot = n.tilt;
          const x = ox * Math.cos(rot) - oy * Math.sin(rot);
          const y = ox * Math.sin(rot) + oy * Math.cos(rot);
          const wob = Math.sin(t * n.wobble + n.phase) * 8;
          n.depth = sa; // -1 detrás, +1 delante
          n.scale = 0.72 + (n.depth + 1) / 2 * 0.6;
          n.alpha = enabled[n.cat] ? 0.45 + (n.depth + 1) / 2 * 0.55 : 0.06;
          n.x = coreX + x + par.x + wob * 0.3;
          n.y = coreY + y + par.y;
          n.r = n.baseR * n.scale;
          if (n.pulse > 0) n.pulse = Math.max(0, n.pulse - 0.012);
        }

        // detectar hover
        hovered = -1;
        let hd = 24;
        nodes.forEach((n, i) => {
          if (!enabled[n.cat]) return;
          const d = Math.hypot(mx - n.x, my - n.y);
          if (d < hd + n.r) { hd = d; hovered = i; }
        });

        // ordenar por profundidad (detrás primero)
        const order = nodes.map((_, i) => i).sort((a, b) => nodes[a].depth - nodes[b].depth);

        // dibujar nodos DETRÁS del orbe
        drawNodes(order.filter((i) => nodes[i].depth < 0), t, coreX, coreY);

        // conexiones entre nodos (constelación) — solo visibles
        ctx.lineWidth = 1;
        for (const [a, b] of edges) {
          const na = nodes[a], nb = nodes[b];
          if (!enabled[na.cat] || !enabled[nb.cat]) continue;
          const al = 0.10 + 0.10 * Math.min(na.alpha, nb.alpha);
          ctx.strokeStyle = hexA("#7fdfff", al);
          ctx.beginPath();
          ctx.moveTo(na.x, na.y);
          ctx.lineTo(nb.x, nb.y);
          ctx.stroke();
        }

        // orbe central
        drawCore(t, coreX, coreY);

        // dibujar nodos DELANTE del orbe
        drawNodes(order.filter((i) => nodes[i].depth >= 0), t, coreX, coreY);

        // tooltip
        if (hovered >= 0) {
          const n = nodes[hovered];
          tip.style.left = n.x + "px";
          tip.style.top = n.y - n.r + "px";
          tip.style.opacity = "1";
          tip.style.borderColor = hexA(n.color, 0.6);
          tipCat.textContent = CATS[n.cat].name;
          tipCat.style.color = n.color;
          tipLbl.textContent = n.label;
          tipVal.textContent = n.val;
          canvas.style.cursor = "pointer";
        } else {
          tip.style.opacity = "0";
          canvas.style.cursor = "default";
        }

        requestAnimationFrame(frame);
      }

      function drawNodes(idxs, t, coreX, coreY) {
        for (const i of idxs) {
          const n = nodes[i];
          const isHover = i === hovered;
          // línea de confianza centro → nodo
          const la = (enabled[n.cat] ? 0.14 + (n.depth + 1) / 2 * 0.14 : 0.03) * (isHover ? 2.2 : 1);
          const grad = ctx.createLinearGradient(coreX, coreY, n.x, n.y);
          grad.addColorStop(0, hexA(n.color, 0));
          grad.addColorStop(1, hexA(n.color, la));
          ctx.strokeStyle = grad;
          ctx.lineWidth = isHover ? 1.6 : 1;
          ctx.beginPath();
          ctx.moveTo(coreX, coreY);
          ctx.lineTo(n.x, n.y);
          ctx.stroke();

          // pulso de energía viajando por la línea
          if (enabled[n.cat]) {
            let p = (pulses[i] + t * 0.28) % 1;
            const ex = coreX + (n.x - coreX) * p;
            const ey = coreY + (n.y - coreY) * p;
            ctx.fillStyle = hexA(n.color, (1 - p) * n.alpha * 0.9);
            ctx.beginPath();
            ctx.arc(ex, ey, 1.8, 0, Math.PI * 2);
            ctx.fill();
          }

          // nodo
          const rr = n.r * (isHover ? 1.6 : 1) + (n.pulse > 0 ? n.pulse * 6 : 0);
          glowCircle(n.x, n.y, rr, n.color, n.alpha);

          // anillo de click
          if (n.pulse > 0) {
            ctx.strokeStyle = hexA(n.color, n.pulse * 0.8);
            ctx.lineWidth = 1.5;
            ctx.beginPath();
            ctx.arc(n.x, n.y, rr + (1 - n.pulse) * 22, 0, Math.PI * 2);
            ctx.stroke();
          }

          // etiqueta si hover o nodo grande al frente
          if (isHover || (n.depth > 0.4 && enabled[n.cat])) {
            ctx.textAlign = "center";
            ctx.fillStyle = hexA("#eaf2ff", isHover ? 0.95 : 0.5 * n.alpha);
            ctx.font = `${isHover ? 12 : 10}px 'Share Tech Mono', monospace`;
            ctx.fillText(n.label, n.x, n.y - rr - 8);
          }
        }
      }

      requestAnimationFrame(frame);
    </script>
  </body>
</html>
